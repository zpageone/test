        <h1>개인정보처리방침</h1>
        <p>본 사이트는 사용자의 개인정보를 소중히 여기며, 관련 법령을 준수합니다.</p>
        <h2>1. 수집하는 개인정보</h2>
        <p>이름, 생년월일시, 성별 등 서비스 이용에 필요한 최소한의 정보를 수집합니다.</p>
        <h2>2. 정보의 이용 목적</h2>
        <p>운세 결과 제공 및 사용자 분석을 위해서만 사용됩니다.</p>
        <h2>3. 정보의 보유 및 파기</h2>
        <p>수집된 정보는 서비스 제공 후 즉시 파기되거나, 관련 법령에 따라 일정 기간 보관될 수 있습니다.</p>
