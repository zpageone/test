    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타로 오라클 - 연애운 고르기</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8984759492882177"
     crossorigin="anonymous"></script>

<body>
    <div class="app-container">
        <header class="app-header">
            <a href="index.html" class="back-btn">←</a>
            <div class="logo">Tarot<span>.</span></div>
            <div class="header-icons"></div>
        </header>

        <main class="content-area">
            <section class="tarot-intro">
                <h1 id="tarot-title">그 사람의 속마음</h1>
                <p id="tarot-desc">눈을 감고 상대방을 떠올리며<br>가장 끌리는 카드 한 장을 선택하세요.</p>
            </section>

            <!-- Card Spread Area -->
            <div class="tarot-spread" id="card-spread">
                <!-- JS will inject cards here -->
            </div>

            <!-- Result Area (Initially Hidden) -->
            <div id="tarot-result-view" class="result-container" style="display: none;">
                <div class="picked-card-reveal">
                    <div class="card-image-box">
                        <img id="result-card-img" src="" alt="Picked Card">
                    </div>
                    <h2 id="result-card-name">카드 이름</h2>
                </div>
                <div class="result-text-box">
                    <h3>연애운 해석</h3>
                    <p id="result-interpretation">해석 내용이 여기에 표시됩니다.</p>
                </div>
                <button class="retry-btn" onclick="location.reload()">다시 고르기</button>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
