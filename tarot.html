    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타로 오라클 - Tarot Oracle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8984759492882177"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-8984759492882177">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <a href="index.html" class="back-btn">←</a>
            <div class="logo">Tarot<span>.</span></div>
            <div class="header-icons">
                <button class="icon-btn" id="lang-toggle">🌐 EN</button>
            </div>
        </header>

        <main class="content-area">
            <section class="tarot-intro">
                <h1 id="tarot-title" data-i18n="tarot.intro_title">그 사람의 속마음</h1>
                <p id="tarot-desc" data-i18n="tarot.intro_desc">눈을 감고 상대방을 떠올리며<br>가장 끌리는 카드 한 장을 선택하세요.</p>
            </section>

            <!-- Card Spread Area -->
            <div class="tarot-spread" id="card-spread">
                <!-- JS will inject cards here -->
            </div>

            <!-- Result Area (Initially Hidden) -->
            <div id="tarot-result-view" class="result-container" style="display: none;">
                <div class="picked-card-reveal">
                    <div class="card-image-box">
                        <img id="result-card-img" src="" alt="Picked Card">
                    </div>
                    <h2 id="result-card-name">카드 이름</h2>
                </div>
                <div class="result-text-box">
                    <h3 data-i18n="tarot.result_title">연애운 해석</h3>
                    <p id="result-interpretation">해석 내용이 여기에 표시됩니다.</p>
                </div>

                <!-- Email Report Section -->
                <div class="email-report-section" style="margin-top: 2rem; padding: 1.5rem; background: #f8f9fa; border-radius: 15px;">
                    <h4 style="margin-bottom: 1rem; color: var(--primary-purple);" data-i18n="email.title">결과 리포트 이메일로 받기</h4>
                    <div style="display: flex; gap: 10px;">
                        <input type="email" id="user-email" placeholder="이메일 주소를 입력하세요" style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px;" data-i18n="[placeholder]email.placeholder">
                        <button id="send-email-btn" style="padding: 12px 20px; background: var(--primary-purple); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;" data-i18n="email.button">발송</button>
                    </div>
                    <p id="email-status" style="margin-top: 10px; font-size: 0.85rem; color: #666; display: none;"></p>
                </div>

                <button class="retry-btn" onclick="location.reload()" data-i18n="tarot.retry">다시 고르기</button>
            </div>
        </main>
    </div>
    <script src="locales.js"></script>
    <script src="main.js"></script>
</body>
</html>
