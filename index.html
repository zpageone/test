
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Teller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode">
        <span id="theme-icon">🌙</span>
    </button>
    <div class="container">
        <header>
            <h1>명리 사주 오라클</h1>
            <p>당신의 태어난 시각에 숨겨진 운명의 지도를 확인하세요.</p>
        </header>
        <main>
            <form id="fortune-form">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" placeholder="이름을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>생년월일 및 태어난 시간</label>
                    <div class="select-row">
                        <select id="birth-year" required>
                            <option value="" disabled selected>년</option>
                            <!-- Years will be populated by JS -->
                        </select>
                        <select id="birth-month" required>
                            <option value="" disabled selected>월</option>
                            <!-- Months will be populated by JS -->
                        </select>
                        <select id="birth-day" required>
                            <option value="" disabled selected>일</option>
                            <!-- Days will be populated by JS -->
                        </select>
                        <select id="birth-hour" required>
                            <option value="" disabled selected>시</option>
                            <!-- Hours will be populated by JS -->
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>양력/음력</label>
                    <div class="radio-group">
                        <label><input type="radio" name="calendar-type" value="solar" checked> 양력</label>
                        <label><input type="radio" name="calendar-type" value="lunar"> 음력</label>
                    </div>
                </div>
                <button type="submit">사주 풀이 보기</button>
            </form>
            <div id="fortune-result" aria-live="polite"></div>
        </main>
        
        <footer class="app-footer">
            <button id="inquiry-toggle" class="inquiry-btn">제휴 문의하기</button>
            <div id="inquiry-modal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h2>제휴 및 서비스 문의</h2>
                    <form action="https://formspree.io/f/myklnvkg" method="POST" id="inquiry-form">
                        <div class="form-group">
                            <label for="email">이메일 주소</label>
                            <input type="email" name="email" id="email" placeholder="example@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="message">문의 내용</label>
                            <textarea name="message" id="message" rows="5" placeholder="문의하실 내용을 입력해주세요." required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">문의 보내기</button>
                    </form>
                </div>
            </div>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
